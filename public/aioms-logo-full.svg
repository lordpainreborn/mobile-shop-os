<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 500" width="1400" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f1d32"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="500" rx="24" fill="url(#bg)"/>

  <!-- Letter A — Left leg -->
  <polygon points="60,400 200,80 230,80 90,400" fill="#2979FF"/>
  <!-- Letter A — Right leg -->
  <polygon points="340,400 240,80 270,80 370,400" fill="#2979FF"/>
  <!-- Growth Arrow — sweeping curve -->
  <path d="M 70 340 Q 130 310, 190 260 Q 250 210, 300 170 Q 330 140, 350 120 L 335 150 Q 310 175, 270 215 Q 210 270, 150 320 Q 110 345, 80 350 Z" fill="#F5A623"/>
  <polygon points="355,115 325,140 360,140" fill="#F5A623"/>

  <!-- Brand Text: AIOMS -->
  <text
    x="460" y="270"
    font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="140"
    font-weight="800"
    letter-spacing="12"
    fill="#F8FAFC"
  >AIOMS</text>

  <!-- Tagline -->
  <text
    x="462" y="320"
    font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28"
    font-weight="500"
    letter-spacing="10"
    fill="#64748B"
  >POS SYSTEM</text>

  <!-- Accent line -->
  <rect x="462" y="345" width="200" height="4" rx="2" fill="#F5A623" opacity="0.7"/>
</svg>
